schema_version: 1

context:
  version: "0.85.0"

package:
  name: python-substrait-extensions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/substrait-extensions/substrait_extensions-${{ version }}.tar.gz
  sha256: 6b5403b5e7d9cf5f9dbe86f276c6485c9155bec78fab080310202c99b177ca8a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - substrait_extensions.extensions.simple_extensions
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Packaged Substrait Extension Files
  license: Apache-2.0
  # The 0.79.0 sdist does not bundle a license file; the LICENSE here is a vendored copy.
  # Upstream ships it from 0.97.0 on (substrait-io/substrait-packaging#29) — when bumping
  # this recipe to >=0.97.0, drop the vendored LICENSE and rely on the one in the sdist.
  license_file: LICENSE
  homepage: https://substrait.io
  repository: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - nielspardon
