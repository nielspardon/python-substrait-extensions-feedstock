schema_version: 1

context:
  version: "0.96.0"

package:
  name: python-substrait-extensions
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/substrait-extensions/substrait_extensions-${{ version }}.tar.gz
  sha256: 822e19493797c99728d4a35ccaff79991bd0d07c8d29fad7f0d16827136cbaa9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - substrait_extensions.extensions.simple_extensions
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Packaged Substrait Extension Files
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://substrait.io
  repository: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - benbellick
    - vbarua
    - nielspardon
